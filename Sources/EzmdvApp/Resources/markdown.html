<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
      media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css"
      media="(prefers-color-scheme: light)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<!-- KaTeX -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.11/contrib/auto-render.min.js"></script>
<!-- Marked.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<!-- Mermaid -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/11.4.1/mermaid.min.js"></script>
<style>
/* === Inlined markdown.css (loadHTMLString can't load local CSS files) === */
:root {
  --bg: #ffffff; --fg: #1a1a2e; --fg-secondary: #555;
  --border: #e5e7eb; --code-bg: #f6f8fa;
  --blockquote-border: #d0d7de; --link: #0969da;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117; --fg: #e6edf3; --fg-secondary: #8b949e;
    --border: #30363d; --code-bg: #161b22;
    --blockquote-border: #3b434b; --link: #58a6ff;
  }
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg); color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 15px; line-height: 1.7; overflow: hidden;
}
.markdown-body { max-width: 820px; margin: 0 auto; padding: 32px 40px 80px; }
.markdown-body h1, .markdown-body h2, .markdown-body h3,
.markdown-body h4, .markdown-body h5, .markdown-body h6 {
  margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; line-height: 1.25;
}
.markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.markdown-body h3 { font-size: 1.25em; }
.markdown-body p { margin: 0.8em 0; }
.markdown-body a { color: var(--link); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body img { max-width: 100%; border-radius: 6px; }
.markdown-body blockquote {
  margin: 1em 0; padding: 0.5em 1em;
  border-left: 4px solid var(--blockquote-border);
  color: var(--fg-secondary); background: var(--code-bg); border-radius: 0 6px 6px 0;
}
.markdown-body pre {
  background: var(--code-bg); border-radius: 8px; padding: 16px;
  overflow-x: auto; font-size: 13px; border: 1px solid var(--border);
}
.markdown-body code { font-family: "SF Mono", "Fira Code", Menlo, monospace; font-size: 0.88em; }
.markdown-body :not(pre) > code {
  background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 4px; border: 1px solid var(--border);
}
.markdown-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.markdown-body th { background: var(--code-bg); font-weight: 600; }
.markdown-body tr:nth-child(even) { background: var(--code-bg); }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
.markdown-body ul, .markdown-body ol { padding-left: 2em; }
.markdown-body li { margin: 0.3em 0; }
.markdown-body input[type="checkbox"] { margin-right: 0.5em; accent-color: var(--link); }
.mermaid { margin: 1.5em 0; text-align: center; }
.katex-display { margin: 1em 0; overflow-x: auto; }

/* Wiki-links */
a.wiki-link {
  color: var(--link); text-decoration: none;
  border-bottom: 1px dashed var(--link); padding-bottom: 1px;
}
a.wiki-link:hover { border-bottom-style: solid; }
a.wiki-link.unresolved { color: var(--fg-secondary); border-bottom-color: var(--fg-secondary); opacity: 0.7; }

/* === Callout / Admonition blocks === */
.callout {
  border-radius: 8px; margin: 1em 0; overflow: hidden;
  border: 1px solid; border-left-width: 4px;
}
.callout-title {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; font-weight: 600; font-size: 0.88em; user-select: none;
}
.callout-foldable { cursor: pointer; }
.callout-foldable:hover { opacity: 0.85; }
.callout-fold-icon { margin-left: auto; font-size: 11px; transition: transform 0.2s; display: inline-block; }
.callout.callout-collapsed .callout-fold-icon { transform: rotate(-90deg); }
.callout.callout-collapsed .callout-body { display: none; }
.callout-body { padding: 8px 14px 12px; }
.callout-body > :first-child { margin-top: 0; }
.callout-body > :last-child { margin-bottom: 0; }
/* — type colors — */
.callout-note, .callout-info {
  border-color: #4a9eed; background: #eaf3fb;
}
.callout-note .callout-title, .callout-info .callout-title { background: #d0e8f8; color: #1a5f8c; }
.callout-tip, .callout-success, .callout-check, .callout-done {
  border-color: #4caf50; background: #eaf7ea;
}
.callout-tip .callout-title, .callout-success .callout-title, .callout-check .callout-title, .callout-done .callout-title { background: #d0f0d0; color: #2e7d32; }
.callout-warning, .callout-caution, .callout-attention {
  border-color: #ff9800; background: #fff8e1;
}
.callout-warning .callout-title, .callout-caution .callout-title, .callout-attention .callout-title { background: #ffe0b2; color: #bf6f00; }
.callout-danger, .callout-error, .callout-bug, .callout-failure, .callout-fail, .callout-missing {
  border-color: #f44336; background: #ffebee;
}
.callout-danger .callout-title, .callout-error .callout-title, .callout-bug .callout-title,
.callout-failure .callout-title, .callout-fail .callout-title, .callout-missing .callout-title { background: #ffcdd2; color: #c62828; }
.callout-question, .callout-help, .callout-faq {
  border-color: #00bcd4; background: #e0f7fa;
}
.callout-question .callout-title, .callout-help .callout-title, .callout-faq .callout-title { background: #b2ebf2; color: #00838f; }
.callout-quote, .callout-cite { border-color: #9e9e9e; background: #f5f5f5; }
.callout-quote .callout-title, .callout-cite .callout-title { background: #e0e0e0; color: #616161; }
.callout-example, .callout-abstract, .callout-summary, .callout-tldr {
  border-color: #9c27b0; background: #f3e5f5;
}
.callout-example .callout-title, .callout-abstract .callout-title,
.callout-summary .callout-title, .callout-tldr .callout-title { background: #e1bee7; color: #6a1b9a; }
.callout-important { border-color: #e91e63; background: #fce4ec; }
.callout-important .callout-title { background: #f8bbd0; color: #880e4f; }
@media (prefers-color-scheme: dark) {
  .callout-note, .callout-info { border-color: #4a9eed; background: #1a2733; }
  .callout-note .callout-title, .callout-info .callout-title { background: #1e3448; color: #58a6ff; }
  .callout-tip, .callout-success, .callout-check, .callout-done { border-color: #4caf50; background: #1a2a1a; }
  .callout-tip .callout-title, .callout-success .callout-title, .callout-check .callout-title, .callout-done .callout-title { background: #1e3a1e; color: #66bb6a; }
  .callout-warning, .callout-caution, .callout-attention { border-color: #ff9800; background: #2a2010; }
  .callout-warning .callout-title, .callout-caution .callout-title, .callout-attention .callout-title { background: #3a2e10; color: #ffa726; }
  .callout-danger, .callout-error, .callout-bug, .callout-failure, .callout-fail, .callout-missing { border-color: #f44336; background: #2a1a1a; }
  .callout-danger .callout-title, .callout-error .callout-title, .callout-bug .callout-title,
  .callout-failure .callout-title, .callout-fail .callout-title, .callout-missing .callout-title { background: #3a1a1a; color: #ef5350; }
  .callout-question, .callout-help, .callout-faq { border-color: #00bcd4; background: #0a2a2e; }
  .callout-question .callout-title, .callout-help .callout-title, .callout-faq .callout-title { background: #0e3a40; color: #26c6da; }
  .callout-quote, .callout-cite { border-color: #9e9e9e; background: #1e1e1e; }
  .callout-quote .callout-title, .callout-cite .callout-title { background: #2a2a2a; color: #9e9e9e; }
  .callout-example, .callout-abstract, .callout-summary, .callout-tldr { border-color: #9c27b0; background: #1e0a2a; }
  .callout-example .callout-title, .callout-abstract .callout-title,
  .callout-summary .callout-title, .callout-tldr .callout-title { background: #2a1038; color: #ce93d8; }
  .callout-important { border-color: #e91e63; background: #2a0a1a; }
  .callout-important .callout-title { background: #3a1028; color: #f48fb1; }
}

/* === Footnotes === */
.footnotes { font-size: 0.85em; color: var(--fg-secondary); margin-top: 2em; }
.footnotes ol { padding-left: 1.5em; }
.footnotes li { margin: 0.3em 0; }
a.footnote-ref { font-size: 0.8em; text-decoration: none; color: var(--link); vertical-align: super; line-height: 0; }
a.footnote-ref:hover { text-decoration: underline; }
a.footnote-back { text-decoration: none; color: var(--link); margin-left: 4px; }
a.footnote-back:hover { text-decoration: underline; }
hr.footnotes-sep { margin: 2em 0 1em; opacity: 0.3; }

/* === Note Transclusion === */
.transcluded-note {
  border: 1px solid var(--border); border-left: 3px solid var(--link);
  border-radius: 0 6px 6px 0; padding: 8px 16px; margin: 1em 0;
  background: var(--code-bg); position: relative;
}
.transcluded-note::before {
  content: '↗'; position: absolute; top: 6px; right: 10px;
  opacity: 0.35; font-size: 12px; pointer-events: none;
}
.transcluded-note > :first-child { margin-top: 0; }
.transcluded-note > :last-child { margin-bottom: 0; }
.transcluded-missing {
  border-left-color: #f44336; color: var(--fg-secondary); font-size: 0.88em; font-style: italic;
}

/* === Presentation mode slide content === */
.slide-content.markdown-body {
  max-width: 820px; width: 90%; font-size: 1.5em; line-height: 1.5;
  padding: 20px 40px; color: #e6edf3;
}
.slide-content.markdown-body h1 { font-size: 1.8em; border-color: rgba(255,255,255,0.15); }
.slide-content.markdown-body h2 { font-size: 1.4em; border-color: rgba(255,255,255,0.15); }
.slide-content.markdown-body a { color: #79c0ff; }
.slide-content.markdown-body code, .slide-content.markdown-body pre { font-size: 0.75em; }
#slide-body {
    opacity: 1;
    transition: opacity 0.15s ease;
}
#slide-body.slide-fading {
    opacity: 0;
}

/* === Find highlights === */
mark.find-highlight {
  background: #ffe066;
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}
mark.find-highlight.find-current {
  background: #ff8c00;
  outline: 2px solid #ff8c00;
  border-radius: 2px;
}
@media (prefers-color-scheme: dark) {
  mark.find-highlight { background: #7a6000; color: #ffe066; }
  mark.find-highlight.find-current { background: #b87800; outline-color: #ffb300; color: #fff; }
}

/* === Print === */
@media print {
  body { overflow: visible !important; }
  #view-container { display: block !important; height: auto !important; overflow: visible !important; }
  #edit-container, #preview-container { display: none !important; }
  .markdown-body { max-width: 100% !important; padding: 0 !important; }
  a.wiki-link { border-bottom: none !important; }
  a.wiki-link.unresolved { opacity: 1 !important; }
}

/* === Layout containers === */
#view-container { display: none; height: 100%; overflow-y: auto; }
#view-container.active { display: block; }
#view-container .markdown-body { padding: 24px 32px; }

#edit-container { display: none; height: 100%; overflow: hidden; }
#edit-container.active { display: flex; flex-direction: column; }
#edit-container .cm-editor { flex: 1; }
#preview-container { display: none; height: 100%; }
#preview-container.active { display: grid; grid-template-columns: 1fr 1fr; }
#editor-pane { overflow: hidden; display: flex; flex-direction: column; }
#editor-pane .cm-editor { flex: 1; }
#render-pane { overflow-y: auto; border-left: 1px solid var(--border); }
#render-pane .markdown-body { padding: 24px 32px; }
</style>
</head>
<body>
<!-- Three containers — only one active at a time -->
<div id="view-container" class="active">
  <article id="content" class="markdown-body"></article>
</div>

<div id="edit-container">
  <!-- CodeMirror mounts here -->
</div>

<div id="preview-container">
  <div id="editor-pane"><!-- CodeMirror mounts here --></div>
  <div id="render-pane"><article class="markdown-body"></article></div>
</div>

<!-- CodeMirror bundle injected via WKUserScript by Swift -->
<script>
// --- Global state ---
let rawMarkdown = '';
let currentMode = 'view';
let editorManager = null;
let projectFiles = []; // [{name, path, relativePath}] — set from Swift

// --- Wiki-link transformation ---
// Converts [[target]] and [[target|display]] to clickable links before marked processes them
function transformWikiLinks(md) {
  return md.replace(/\[\[([^\[\]]+)\]\]/g, function(match, inner) {
    const parts = inner.split('|');
    const target = parts[0].trim();
    const display = parts.length > 1 ? parts[1].trim() : target;
    const encoded = encodeURIComponent(target);
    const resolved = resolveWikiTarget(target);
    const cls = resolved ? 'wiki-link' : 'wiki-link unresolved';
    return '<a class="' + cls + '" href="wiki://' + encoded + '">' + display + '</a>';
  });
}

// Resolve a wiki target to a file path (client-side best-effort)
function resolveWikiTarget(target) {
  if (projectFiles.length === 0) return null;
  const targetLower = target.split('#')[0].toLowerCase(); // strip heading anchor
  const withExt = targetLower.endsWith('.md') ? targetLower : targetLower + '.md';
  // Exact relative path match
  let match = projectFiles.find(f => f.relativePath.toLowerCase() === withExt);
  if (match) return match;
  // Basename match
  const matches = projectFiles.filter(f => f.name.toLowerCase() === withExt || f.name.toLowerCase() === targetLower);
  if (matches.length === 1) return matches[0];
  return null;
}

// Called from Swift to set project files for wiki-link resolution
function setProjectFiles(files) {
  projectFiles = files;
  // Also pass to editor manager for autocomplete
  if (window._updateEditorFiles) window._updateEditorFiles(files);
}

// --- Callout icon map ---
function calloutIcon(type) {
  const icons = {
    note: '✏️', info: 'ℹ️', tip: '💡', warning: '⚠️', caution: '⚠️', attention: '⚠️',
    danger: '🔥', error: '❌', bug: '🐛', failure: '❌', fail: '❌', missing: '❌',
    success: '✅', check: '✅', done: '✅', question: '❓', help: '❓', faq: '❓',
    quote: '💬', cite: '💬', example: '📋', abstract: '📄', summary: '📄', tldr: '📄',
    important: '❗',
  };
  return icons[type] || '📌';
}

// --- Callout preprocessor (Obsidian-style > [!type] blocks) ---
function preprocessCallouts(md) {
  return md.replace(
    /^> \[!(\w+)\]([+-]?) ?(.*)\n((?:> [^\n]*\n?)*)/gm,
    (match, type, foldable, title, body) => {
      const t = type.toLowerCase();
      const titleText = title.trim() || (t.charAt(0).toUpperCase() + t.slice(1));
      const bodyMd = body.replace(/^> ?/gm, '').trim();
      const bodyHtml = bodyMd ? marked.parse(bodyMd) : '';
      const isFoldable = foldable !== '';
      const isCollapsed = foldable === '-';
      const foldAttr = isFoldable
        ? ' onclick="this.parentElement.classList.toggle(\'callout-collapsed\')"'
        : '';
      return (
        `<div class="callout callout-${t}${isCollapsed ? ' callout-collapsed' : ''}">\n` +
        `<div class="callout-title${isFoldable ? ' callout-foldable' : ''}"${foldAttr}>` +
        `<span>${calloutIcon(t)}</span>` +
        `<span>${titleText}</span>` +
        (isFoldable ? `<span class="callout-fold-icon">▾</span>` : '') +
        `</div>\n` +
        `<div class="callout-body">${bodyHtml}</div>` +
        `</div>\n\n`
      );
    }
  );
}

// --- Footnote preprocessor ([^ref] inline + [^ref]: definition) ---
function processFootnotes(md) {
  const defs = {};
  // Collect single-line definitions and remove them from text
  let cleaned = md.replace(/^\[\^([^\]]+)\]:[ \t]+(.+)$/gm, (_, label, text) => {
    defs[label] = text.trim();
    return '';
  });
  if (Object.keys(defs).length === 0) return md;

  const refOrder = [];
  // Replace inline references with superscript links
  cleaned = cleaned.replace(/\[\^([^\]]+)\]/g, (_, label) => {
    if (!refOrder.includes(label)) refOrder.push(label);
    const n = refOrder.indexOf(label) + 1;
    return `<sup><a href="#fn-${label}" id="fnref-${label}" class="footnote-ref">${n}</a></sup>`;
  });

  // Append footnote section at the end
  if (refOrder.length > 0) {
    const items = refOrder.map((label) => {
      const text = defs[label] || label;
      return `<li id="fn-${label}">${text} <a href="#fnref-${label}" class="footnote-back">↩</a></li>`;
    }).join('\n');
    cleaned = cleaned.trimEnd() +
      `\n\n<hr class="footnotes-sep">\n<section class="footnotes">\n<ol>\n${items}\n</ol>\n</section>\n`;
  }
  return cleaned;
}

// --- Configure marked (with safety check) ---
if (typeof marked !== 'undefined') {
  marked.setOptions({ gfm: true, breaks: false });
  const renderer = new marked.Renderer();
  renderer.code = function({ text, lang }) {
    if (lang === 'mermaid') {
      return '<div class="mermaid">' + text + '</div>';
    }
    const highlighted = (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang))
      ? hljs.highlight(text, { language: lang }).value
      : (typeof hljs !== 'undefined' ? hljs.highlightAuto(text).value : text);
    return '<pre><code class="hljs language-' + (lang || '') + '">' + highlighted + '</code></pre>';
  };
  marked.use({ renderer });
}

if (typeof mermaid !== 'undefined') {
  mermaid.initialize({
    startOnLoad: false,
    theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
    securityLevel: 'loose',
  });
}

// --- Note Transclusion ---
let _transclusionCache = {};
function setTransclusions(dict) { _transclusionCache = dict; }

function preprocessTransclusions(md) {
  return md.replace(/!\[\[([^\[\]]+)\]\]/g, (match, target) => {
    const raw = target.split('|')[0].split('#')[0].trim();
    const key = raw.toLowerCase().replace(/\.md$/, '');
    const content = _transclusionCache[key];
    if (content === undefined) {
      return `<div class="transcluded-note transcluded-missing">⚠ Note not found: ${raw}</div>`;
    }
    const rendered = (typeof marked !== 'undefined') ? marked.parse(content) : content;
    return `<div class="transcluded-note">${rendered}</div>`;
  });
}

// --- Render markdown to an element ---
async function renderMarkdownToEl(md, el) {
  try {
    if (typeof marked !== 'undefined') {
      // Preprocess: transclusions → footnotes → callouts → wiki-links, then parse
      const withTransclusions = preprocessTransclusions(md);
      const withFootnotes = processFootnotes(withTransclusions);
      const withCallouts = preprocessCallouts(withFootnotes);
      const transformed = transformWikiLinks(withCallouts);
      el.innerHTML = marked.parse(transformed);
    } else {
      // Fallback: show raw text if marked.js failed to load
      el.innerText = md;
    }

    // Mermaid
    if (typeof mermaid !== 'undefined') {
      const mermaidEls = el.querySelectorAll('.mermaid');
      if (mermaidEls.length > 0) {
        try { await mermaid.run({ nodes: mermaidEls }); }
        catch(e) { console.error('Mermaid error:', e); }
      }
    }

    // KaTeX
    if (typeof renderMathInElement === 'function') {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false },
        ],
        throwOnError: false,
      });
    }

    // Highlight code blocks
    if (typeof hljs !== 'undefined') {
      el.querySelectorAll('pre code:not(.hljs)').forEach(b => hljs.highlightElement(b));
    }
  } catch(e) {
    console.error('renderMarkdownToEl error:', e);
    el.innerText = md; // fallback to raw text
  }
}

// --- Main render (called from Swift for view mode) ---
async function renderMarkdown(md) {
  rawMarkdown = md;
  const el = document.getElementById('content');
  await renderMarkdownToEl(md, el);
  extractTOC();

  // If in preview mode, also update the preview pane
  if (currentMode === 'preview') {
    const previewEl = document.querySelector('#render-pane .markdown-body');
    if (previewEl) await renderMarkdownToEl(md, previewEl);
  }

  // If editor is open, sync content
  if (editorManager && (currentMode === 'edit' || currentMode === 'preview')) {
    editorManager.setContent(md);
  }
}

// --- TOC extraction ---
function extractTOC() {
  const headings = [];
  document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5, #content h6')
    .forEach((h, i) => {
      const anchor = 'heading-' + i;
      h.id = anchor;
      headings.push({ level: parseInt(h.tagName.charAt(1)), text: h.textContent, anchor: anchor });
    });
  if (window.webkit?.messageHandlers?.tocHandler) {
    window.webkit.messageHandlers.tocHandler.postMessage(headings);
  }
}

// --- Scroll to heading ---
function scrollToHeading(anchor) {
  const el = document.getElementById(anchor);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// --- Mode switching (called from Swift) ---
function setMode(mode) {
  currentMode = mode;
  document.getElementById('view-container').classList.toggle('active', mode === 'view');
  document.getElementById('edit-container').classList.toggle('active', mode === 'edit');
  document.getElementById('preview-container').classList.toggle('active', mode === 'preview');

  if (mode === 'edit') {
    if (editorManager) editorManager.destroy();
    if (!window.EditorManager) {
      console.warn('EditorManager not loaded yet');
      return;
    }
    editorManager = new window.EditorManager();
    const container = document.getElementById('edit-container');
    container.innerHTML = '';
    editorManager.init(container, rawMarkdown);
    editorManager.focus();
  } else if (mode === 'preview') {
    if (editorManager) editorManager.destroy();
    if (!window.EditorManager) {
      console.warn('EditorManager not loaded yet');
      return;
    }
    editorManager = new window.EditorManager();
    const editorPane = document.getElementById('editor-pane');
    editorPane.innerHTML = '';
    editorManager.init(editorPane, rawMarkdown);
    editorManager.focus();
    const previewEl = document.querySelector('#render-pane .markdown-body');
    if (previewEl) renderMarkdownToEl(rawMarkdown, previewEl);
  } else {
    // View mode — destroy editor, re-render view
    if (editorManager) {
      rawMarkdown = editorManager.getContent();
      editorManager.destroy();
      editorManager = null;
    }
    renderMarkdownToEl(rawMarkdown, document.getElementById('content'));
    extractTOC();
  }
}

// --- Get current editor content (called from Swift) ---
function getEditorContent() {
  if (editorManager) return editorManager.getContent();
  return rawMarkdown;
}

// --- Legacy edit mode functions (kept for compatibility) ---
function enterEditMode() { setMode('edit'); }
function exitEditMode() {
  if (editorManager) {
    const content = editorManager.getContent();
    if (content !== rawMarkdown) {
      rawMarkdown = content;
      if (window.webkit?.messageHandlers?.editHandler) {
        window.webkit.messageHandlers.editHandler.postMessage(content);
      }
    }
  }
  setMode('view');
}

// --- Theme change listener ---
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ theme: e.matches ? 'dark' : 'default' });
  }
});

// --- Auto-scroll (teleprompter) ---
const autoScroll = {
  active: false,
  intervalSeconds: 5,
  scrollPercent: 10,
  _userPaused: false,
  _phase: 'waiting',       // 'waiting' | 'animating'
  _waitStart: null,
  _animStart: null,
  _animStartScroll: 0,
  _animTargetScroll: 0,
  _raf: null,
  _resumeTimer: null,
  ANIM_DURATION: 300,

  _easeOutCubic(t) { return 1 - (1 - t) ** 3; },

  _getContainer() {
    if (currentMode === 'view') return document.getElementById('view-container');
    if (currentMode === 'preview') return document.getElementById('render-pane');
    return null;
  },

  toggle() {
    if (this.active) { this.stop(); return; }
    const el = this._getContainer();
    if (!el || el.scrollHeight <= el.clientHeight) return;
    this.active = true;
    this._userPaused = false;
    this._phase = 'animating';
    this._animStart = null;
    this._waitStart = null;
    this._attachListeners();
    this._raf = requestAnimationFrame((t) => this._tick(t));
  },

  stop() {
    this.active = false;
    this._userPaused = false;
    this._phase = 'waiting';
    this._waitStart = null;
    this._animStart = null;
    if (this._raf) { cancelAnimationFrame(this._raf); this._raf = null; }
    if (this._resumeTimer) { clearTimeout(this._resumeTimer); this._resumeTimer = null; }
    this._detachListeners();
  },

  setConfig(intervalSeconds, scrollPercent) {
    this.intervalSeconds = intervalSeconds;
    this.scrollPercent = scrollPercent;
  },

  _startAnimation(el, now) {
    const stepSize = el.clientHeight * (this.scrollPercent / 100);
    this._phase = 'animating';
    this._animStart = now;
    this._animStartScroll = el.scrollTop;
    this._animTargetScroll = el.scrollTop + stepSize;
  },

  _tick(now) {
    const el = this._getContainer();
    if (!el) { this._raf = requestAnimationFrame((t) => this._tick(t)); return; }

    if (this._userPaused) {
      this._waitStart = null;
      this._phase = 'waiting';
      this._raf = requestAnimationFrame((t) => this._tick(t));
      return;
    }

    if (this._phase === 'animating') {
      if (this._animStart === null) {
        this._startAnimation(el, now);
        this._raf = requestAnimationFrame((t) => this._tick(t));
        return;
      }
      const elapsed = now - this._animStart;
      const t = Math.min(elapsed / this.ANIM_DURATION, 1);
      const eased = this._easeOutCubic(t);
      el.scrollTop = this._animStartScroll + (this._animTargetScroll - this._animStartScroll) * eased;

      if (el.scrollTop + el.clientHeight >= el.scrollHeight - 1) {
        this.stop();
        if (window.webkit?.messageHandlers?.autoScrollHandler) {
          window.webkit.messageHandlers.autoScrollHandler.postMessage({ active: false });
        }
        return;
      }
      if (t >= 1) { this._phase = 'waiting'; this._waitStart = now; }
      this._raf = requestAnimationFrame((t) => this._tick(t));
      return;
    }

    // Waiting phase
    if (this._waitStart === null) this._waitStart = now;
    if (now - this._waitStart >= this.intervalSeconds * 1000) {
      this._startAnimation(el, now);
    }
    this._raf = requestAnimationFrame((t) => this._tick(t));
  },

  _onUserScroll() {
    if (!this.active) return;
    this._userPaused = true;
    if (this._resumeTimer) clearTimeout(this._resumeTimer);
    this._resumeTimer = setTimeout(() => {
      this._userPaused = false;
      this._waitStart = null;
    }, 2000);
  },

  _boundOnUserScroll: null,
  _currentListenerEl: null,

  _attachListeners() {
    const el = this._getContainer();
    if (!el) return;
    this._boundOnUserScroll = () => this._onUserScroll();
    this._currentListenerEl = el;
    el.addEventListener('wheel', this._boundOnUserScroll, { passive: true });
  },

  _detachListeners() {
    if (this._currentListenerEl && this._boundOnUserScroll) {
      this._currentListenerEl.removeEventListener('wheel', this._boundOnUserScroll);
    }
    this._boundOnUserScroll = null;
    this._currentListenerEl = null;
  }
};

// Called from Swift
function toggleAutoScroll() { autoScroll.toggle(); return autoScroll.active; }
function stopAutoScroll() { autoScroll.stop(); }
function setAutoScrollConfig(interval, percent) { autoScroll.setConfig(interval, percent); }

// --- Presentation mode ---
const presentation = {
  active: false,
  slides: [],
  currentSlide: 0,
  container: null,
  _keyHandler: null,

  async enter(md) {
    if (this.active) return;
    this.slides = md.split(/\n---+\n/);
    this.currentSlide = 0;
    this.active = true;

    this.container = document.createElement('div');
    this.container.id = 'presentation-overlay';
    Object.assign(this.container.style, {
      position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
      zIndex: '9999', background: '#0d1117', color: '#e6edf3',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    });
    document.body.appendChild(this.container);
    this._bindKeys();
    await this._render(true);

    if (window.webkit?.messageHandlers?.presentationHandler) {
      window.webkit.messageHandlers.presentationHandler.postMessage({ active: true });
    }
  },

  exit() {
    if (!this.active) return;
    this.active = false;
    this._unbindKeys();
    this.container?.remove();
    this.container = null;
    if (window.webkit?.messageHandlers?.presentationHandler) {
      window.webkit.messageHandlers.presentationHandler.postMessage({ active: false });
    }
  },

  async _render(firstRender = false) {
    if (!this.container) return;
    const total = this.slides.length;
    const md = this.slides[this.currentSlide] || '';

    if (firstRender || !document.getElementById('slide-body')) {
      // First render: build the container skeleton
      this.container.innerHTML =
        `<article id="slide-body" class="slide-content markdown-body"></article>` +
        `<div id="slide-counter" style="position:absolute;bottom:18px;right:24px;font-size:12px;opacity:0.45">${this.currentSlide + 1} / ${total}</div>` +
        `<div style="position:absolute;bottom:18px;left:24px;font-size:11px;opacity:0.3">← → navigate &nbsp;·&nbsp; Esc exit</div>`;
      await renderMarkdownToEl(md, document.getElementById('slide-body'));
    } else {
      // Subsequent renders: fade out → update → fade in
      const body = document.getElementById('slide-body');
      const counter = document.getElementById('slide-counter');
      body.classList.add('slide-fading');
      await new Promise(r => setTimeout(r, 120));
      await renderMarkdownToEl(md, body);
      if (counter) counter.textContent = `${this.currentSlide + 1} / ${total}`;
      body.classList.remove('slide-fading');
    }
  },

  next()  { if (this.currentSlide < this.slides.length - 1) { this.currentSlide++; this._render(); } },
  prev()  { if (this.currentSlide > 0)                      { this.currentSlide--; this._render(); } },

  _bindKeys() {
    this._keyHandler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); this.next(); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')                { e.preventDefault(); this.prev(); }
      else if (e.key === 'Escape')                                           { this.exit(); }
    };
    document.addEventListener('keydown', this._keyHandler);
  },

  _unbindKeys() {
    if (this._keyHandler) { document.removeEventListener('keydown', this._keyHandler); this._keyHandler = null; }
  },
};

function enterPresentation() { presentation.enter(rawMarkdown); }
function exitPresentation()  { presentation.exit(); }

// --- Find in View mode ---
let _findMatches = [];   // Array of <mark> DOM elements
let _findIndex = -1;     // Current match index (0-based)

function clearFindHighlights() {
  document.querySelectorAll('mark.find-highlight').forEach(mark => {
    const parent = mark.parentNode;
    parent.replaceChild(document.createTextNode(mark.textContent), mark);
    parent.normalize();
  });
  _findMatches = [];
  _findIndex = -1;
}

function _postFindCount(current, total) {
  if (window.webkit?.messageHandlers?.findHandler) {
    window.webkit.messageHandlers.findHandler.postMessage({ current: current, total: total });
  }
}

function _textNodes(el) {
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      const tag = node.parentElement?.tagName?.toUpperCase();
      if (tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  return nodes;
}

function findInView(query, direction) {
  clearFindHighlights();
  if (!query) { _postFindCount(0, -1); return; }

  const container = document.getElementById('content');
  if (!container) return;

  const textNodes = _textNodes(container);
  const lowerQuery = query.toLowerCase();

  textNodes.forEach(node => {
    const text = node.textContent;
    const lower = text.toLowerCase();
    let idx = 0;
    const parts = [];
    let match;
    while ((match = lower.indexOf(lowerQuery, idx)) !== -1) {
      if (match > idx) parts.push(document.createTextNode(text.slice(idx, match)));
      const mark = document.createElement('mark');
      mark.className = 'find-highlight';
      mark.textContent = text.slice(match, match + query.length);
      parts.push(mark);
      _findMatches.push(mark);
      idx = match + query.length;
    }
    if (parts.length > 0) {
      if (idx < text.length) parts.push(document.createTextNode(text.slice(idx)));
      const frag = document.createDocumentFragment();
      parts.forEach(p => frag.appendChild(p));
      node.parentNode.replaceChild(frag, node);
    }
  });

  const total = _findMatches.length;
  if (total === 0) { _postFindCount(0, 0); return; }

  _findIndex = direction >= 0 ? 0 : total - 1;
  _activateFindMatch();
  _postFindCount(_findIndex + 1, total);
}

function findNextInView() {
  if (_findMatches.length === 0) return;
  _findIndex = (_findIndex + 1) % _findMatches.length;
  _activateFindMatch();
  _postFindCount(_findIndex + 1, _findMatches.length);
}

function findPrevInView() {
  if (_findMatches.length === 0) return;
  _findIndex = (_findIndex - 1 + _findMatches.length) % _findMatches.length;
  _activateFindMatch();
  _postFindCount(_findIndex + 1, _findMatches.length);
}

function _activateFindMatch() {
  _findMatches.forEach((m, i) => {
    m.classList.toggle('find-current', i === _findIndex);
  });
  const current = _findMatches[_findIndex];
  if (current) current.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// --- Find in Edit mode (CodeMirror) ---
let _editorFindMatches = [];
let _editorFindIndex = -1;
let _editorFindQuery = '';

function editorFindOpen(query, direction) {
  if (!editorManager || !editorManager.editor) { _postFindCount(0, 0); return; }
  const content = editorManager.getContent();
  if (!content || !query) { _postFindCount(0, 0); return; }
  const lowerContent = content.toLowerCase();
  const lowerQuery = query.toLowerCase();
  _editorFindMatches = [];
  _editorFindQuery = query;
  let idx = 0;
  let match;
  while ((match = lowerContent.indexOf(lowerQuery, idx)) !== -1) {
    _editorFindMatches.push(match);
    idx = match + lowerQuery.length;
  }
  if (_editorFindMatches.length === 0) { _postFindCount(0, 0); return; }
  _editorFindIndex = direction >= 0 ? 0 : _editorFindMatches.length - 1;
  _editorActivateMatch();
  _postFindCount(_editorFindIndex + 1, _editorFindMatches.length);
}

function _editorActivateMatch() {
  if (!editorManager || !editorManager.editor) return;
  const pos = _editorFindMatches[_editorFindIndex];
  if (pos === undefined) return;
  const view = editorManager.editor;
  view.dispatch({
    selection: { anchor: pos, head: pos + _editorFindQuery.length },
    scrollIntoView: true
  });
  view.focus();
}

function editorFindNext() {
  if (_editorFindMatches.length === 0) return;
  _editorFindIndex = (_editorFindIndex + 1) % _editorFindMatches.length;
  _editorActivateMatch();
  _postFindCount(_editorFindIndex + 1, _editorFindMatches.length);
}

function editorFindPrev() {
  if (_editorFindMatches.length === 0) return;
  _editorFindIndex = (_editorFindIndex - 1 + _editorFindMatches.length) % _editorFindMatches.length;
  _editorActivateMatch();
  _postFindCount(_editorFindIndex + 1, _editorFindMatches.length);
}

function editorCloseSearch() {
  _editorFindMatches = [];
  _editorFindIndex = -1;
  _editorFindQuery = '';
}

function editorReplaceCurrentMatch(replacement) {
  if (!editorManager || !editorManager.editor || _editorFindMatches.length === 0) return;
  const pos = _editorFindMatches[_editorFindIndex];
  const view = editorManager.editor;
  view.dispatch({
    changes: { from: pos, to: pos + _editorFindQuery.length, insert: replacement }
  });
  editorFindOpen(_editorFindQuery, 1);
}

function editorReplaceAllMatches(query, replacement) {
  if (!editorManager || !editorManager.editor) return;
  const content = editorManager.getContent();
  const newContent = content.split(query).join(replacement);
  editorManager.setContent(newContent);
  _postFindCount(0, 0);
}

// --- Signal ready to Swift ---
window.addEventListener('load', function() {
  if (window.webkit?.messageHandlers?.readyHandler) {
    window.webkit.messageHandlers.readyHandler.postMessage('ready');
  }
});
